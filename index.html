<!DOCTYPE html>
<html lang="en">
<head>
<link rel="apple-touch-icon" sizes="128x128" href="favicon.ico">
<link rel="shortcut icon" type="image/png" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Americano">
<title>Americano</title>
<style>
:root {
  --bg: #0d0d0d;
  --card: #1c1c1e;
  --card2: #2c2c2e;
  --accent: #ff6b35;
  --accent-dim: rgba(255,107,53,0.15);
  --text: #f2f2f7;
  --muted: #8e8e93;
  --green: #34c759;
  --red: #ff3b30;
  --sep: #3a3a3c;
  --r: 13px;
  --nav-h: calc(56px + env(safe-area-inset-bottom, 0px));
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100%; overscroll-behavior: none;
}

/* ── SCREENS ─────────────────────────────────────────── */
.screen {
  display: none; padding: 16px 16px 0;
  padding-bottom: calc(var(--nav-h) + 16px);
  min-height: 100vh;
}
.screen.active { display: block; }

.page-title {
  font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 22px; padding-top: 8px;
}

/* ── FORM ELEMENTS ───────────────────────────────────── */
.section-label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin: 20px 0 8px 4px;
}

.stepper {
  display: flex; align-items: center;
  background: var(--card); border-radius: var(--r);
  padding: 12px 16px; gap: 12px;
}
.stepper-label { flex: 1; font-size: 16px; }
.stepper-val { font-size: 22px; font-weight: 700; min-width: 36px; text-align: center; }
.step-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 20px; font-weight: 300; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .1s;
}
.step-btn:active { opacity: .7; }
.step-btn:disabled { background: var(--card2); color: var(--muted); }

.input-row {
  display: flex; align-items: center;
  background: var(--card); border-radius: var(--r);
  padding: 12px 16px; margin-bottom: 8px; gap: 10px;
}
.input-row input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 16px; font-family: inherit;
}
.input-row input::placeholder { color: var(--muted); }
.input-row input.error { color: var(--red); animation: shake .3s ease; }
.del-btn {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--card2); border: none; color: var(--muted);
  font-size: 15px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s;
}
.del-btn:active { background: var(--red); color: #fff; }

.ghost-btn {
  width: 100%; padding: 13px; border-radius: var(--r);
  background: none; border: 1.5px dashed var(--sep);
  color: var(--muted); font-size: 15px; cursor: pointer;
  font-family: inherit; transition: border-color .15s;
}
.ghost-btn:active { border-color: var(--accent); color: var(--accent); }
.ghost-btn.error { border-color: var(--red); color: var(--red); animation: shake .3s ease; }

.primary-btn {
  width: 100%; padding: 15px; border-radius: var(--r);
  background: var(--accent); border: none; color: #fff;
  font-size: 17px; font-weight: 600; cursor: pointer;
  font-family: inherit; margin-top: 24px;
  transition: opacity .1s;
}
.primary-btn:active { opacity: .8; }
.primary-btn:disabled { background: var(--card2); color: var(--muted); cursor: not-allowed; }

.danger-btn {
  width: 100%; padding: 14px; border-radius: var(--r);
  background: none; border: 1.5px solid var(--red);
  color: var(--red); font-size: 15px; cursor: pointer;
  font-family: inherit; margin-top: 10px;
}
.danger-btn:active { background: rgba(255,59,48,.1); }

/* ── ROUNDS ───────────────────────────────────────────── */
.slot-card {
  background: var(--card); border-radius: var(--r);
  margin-bottom: 10px; overflow: hidden;
}
.slot-header {
  display: flex; align-items: center;
  padding: 13px 16px; cursor: pointer; gap: 8px;
  user-select: none;
}
.slot-label {
  flex: 1; font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; color: var(--accent);
}
.slot-status { font-size: 12px; color: var(--muted); }
.slot-chevron {
  color: var(--muted); transition: transform .2s;
  flex-shrink: 0;
}
.slot-card.open .slot-chevron { transform: rotate(180deg); }
.slot-body { display: none; padding: 0 10px 10px; }
.slot-card.open .slot-body { display: block; }
.match-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.match-grid .last-row-wrap {
  grid-column: 1 / -1;
  display: flex; justify-content: center; gap: 10px;
}

.match-card {
  background: var(--card2); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px; overflow: hidden;
}
.match-court {
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
}

/* played state */
.match-played { display: flex; align-items: center; gap: 6px; }
.match-played .tn {
  flex: 1; font-size: 15px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.match-played .tn.win { color: var(--green); }
.match-played .tn.r { text-align: right; }
.score-badge {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.score-badge .sc { font-size: 22px; font-weight: 800; }
.score-badge .sc.win { color: var(--green); }
.score-badge .dash { color: var(--muted); font-size: 16px; }
.edit-link {
  font-size: 12px; color: var(--accent); cursor: pointer;
  text-align: center; margin-top: 6px;
  text-decoration: underline; text-underline-offset: 2px;
}

/* input state */
.match-vs { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.match-vs .tn {
  flex: 1; font-size: 15px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.match-vs .tn.r { text-align: right; }
.vs-tag { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; width: 100%; overflow: hidden; }
.score-input {
  flex: 1; min-width: 0; width: 0; padding: 10px 8px; border-radius: 9px;
  background: var(--bg); border: 1.5px solid var(--sep);
  color: var(--text); font-size: 22px; font-weight: 700;
  text-align: center; font-family: inherit; outline: none;
  -webkit-appearance: none; appearance: none;
}
.score-input:focus { border-color: var(--accent); }
.score-dash { font-size: 18px; font-weight: 700; color: var(--muted); }
.save-btn {
  width: 100%; padding: 10px; border-radius: 9px;
  background: var(--accent); border: none; color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: opacity .1s;
}
.save-btn:active { opacity: .8; }

/* bye row */
.bye-row {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,107,53,.07);
  border: 1px solid rgba(255,107,53,.2);
  border-radius: 9px; padding: 10px 14px;
  font-size: 13px; color: var(--muted);
  margin-bottom: 8px;
}
.bye-row strong { color: var(--accent); }

/* ── MIXER MATCH ─────────────────────────────────── */
.mixer-row { display: flex; align-items: center; gap: 8px; }
.mixer-team-col { flex: 1; min-width: 0; }
.mixer-team-col.right { text-align: right; }
.mixer-player { font-size: 14px; font-weight: 600; padding: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mixer-player.win { color: var(--green); }

/* ── STANDINGS ────────────────────────────────────────── */
.progress-bar-wrap {
  background: var(--card2); border-radius: 100px;
  height: 5px; margin-bottom: 18px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--accent); border-radius: 100px;
  transition: width .4s ease;
}
.progress-label {
  font-size: 13px; color: var(--muted); margin-bottom: 6px;
}

.s-table { width: 100%; border-collapse: collapse; }
.s-table th {
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  padding: 6px 0; text-align: right;
}
.s-table th:first-child { text-align: left; padding-left: 4px; }
.s-table td {
  padding: 13px 0; border-top: 1px solid var(--sep);
  text-align: right; font-size: 15px;
}
.s-table td:first-child { text-align: left; padding-left: 4px; }
.rank-num {
  display: inline-block; width: 22px; font-size: 13px;
  font-weight: 700; color: var(--muted); margin-right: 6px;
}
.rank-num.gold { color: #ffd60a; }
.rank-num.silver { color: #b0b0b0; }
.rank-num.bronze { color: #cd7f32; }
.s-name { font-weight: 600; }
.s-pts { font-size: 18px; font-weight: 800; }

/* ── BOTTOM NAV ───────────────────────────────────────── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex;
  background: rgba(18,18,20,.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: .5px solid rgba(255,255,255,.08);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 0; gap: 3px;
  font-size: 10px; font-weight: 500;
  color: var(--muted); border: none; background: none;
  cursor: pointer; font-family: inherit;
  transition: color .12s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 23px; height: 23px; }

/* ── EMPTY / UTIL ─────────────────────────────────────── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 15px; line-height: 1.7;
}
.empty strong { color: var(--text); }

.pill {
  display: inline-block; padding: 3px 9px; border-radius: 100px;
  font-size: 11px; font-weight: 600;
  background: var(--accent-dim); color: var(--accent);
  margin-bottom: 8px;
}

/* ── PRESETS ──────────────────────────────────────── */
.preset-item {
  background: var(--card); border-radius: var(--r);
  margin-bottom: 8px; overflow: hidden;
}
.preset-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.preset-info { flex: 1; min-width: 0; }
.preset-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.preset-meta { font-size: 12px; color: var(--muted); }
.preset-chevron { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
.preset-item.open .preset-chevron { transform: rotate(180deg); }
.preset-body { display: none; padding: 0 16px 14px; }
.preset-item.open .preset-body { display: block; }
.preset-names {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.preset-tag {
  padding: 4px 10px; border-radius: 100px;
  background: var(--card2); font-size: 13px; color: var(--text);
}
.preset-actions { display: flex; gap: 8px; flex-shrink: 0; }
.preset-load-btn {
  padding: 7px 14px; border-radius: 8px;
  background: var(--accent); border: none; color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.preset-del-btn {
  padding: 7px 10px; border-radius: 8px;
  background: var(--card2); border: none; color: var(--red);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.save-preset-row {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.save-preset-row input {
  flex: 1; background: var(--card); border: 1.5px solid transparent; outline: none;
  border-radius: var(--r); padding: 12px 16px;
  color: var(--text); font-size: 16px; font-family: inherit;
  transition: border-color .15s;
}
.save-preset-row input::placeholder { color: var(--muted); }
.save-preset-row input.error { border-color: var(--red); animation: shake .3s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  60%      { transform: translateX(6px); }
}
.save-preset-row button {
  padding: 12px 18px; border-radius: var(--r);
  background: var(--accent); border: none; color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}

/* ── MODE SELECTOR ────────────────────────────────── */
.seg {
  display: flex; background: var(--card2); border-radius: var(--r);
  padding: 3px; gap: 3px;
}
.seg-btn {
  flex: 1; padding: 9px 0; border-radius: 10px;
  border: none; background: none;
  color: var(--muted); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background .15s, color .15s;
}
/* ── TOAST ────────────────────────────────────────── */
.toast {
  position: fixed; top: 16px; right: 16px; z-index: 999;
  background: var(--card); border: 1px solid var(--sep);
  color: var(--text); font-size: 13px; font-weight: 600;
  padding: 10px 16px; border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  transform: translateY(-8px); opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

.seg-btn.active {
  background: var(--card); color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
</style>
</head>
<body>

<!-- ──────────────── SETUP ──────────────── -->
<div id="screen-setup" class="screen active">
  <div class="page-title">⚡ Americano</div>

  <div class="section-label">Mode</div>
  <div class="seg">
    <button class="seg-btn" id="mode-singles" onclick="setMode('singles')">Singles</button>
    <button class="seg-btn" id="mode-teams"   onclick="setMode('teams')">Teams</button>
    <button class="seg-btn" id="mode-mixer"   onclick="setMode('mixer')">Mixer</button>
  </div>

  <div class="section-label">Courts available</div>
  <div class="stepper">
    <span class="stepper-label">Number of courts</span>
    <button class="step-btn" id="courts-minus" onclick="adj('courts',-1)">−</button>
    <div class="stepper-val" id="courts-val">2</div>
    <button class="step-btn" onclick="adj('courts',1)">+</button>
  </div>

  <div id="mixer-settings" style="display:none">
    <div class="section-label">Team size</div>
    <div class="stepper">
      <span class="stepper-label">Players per team</span>
      <button class="step-btn" id="teamsize-minus" onclick="adj('teamSize',-1)">−</button>
      <div class="stepper-val" id="teamsize-val">2</div>
      <button class="step-btn" onclick="adj('teamSize',1)">+</button>
    </div>
    <div class="section-label">Rounds to generate</div>
    <div class="stepper">
      <span class="stepper-label">Number of rounds</span>
      <button class="step-btn" id="numrounds-minus" onclick="adj('numRounds',-1)">−</button>
      <div class="stepper-val" id="numrounds-val">4</div>
      <button class="step-btn" onclick="adj('numRounds',1)">+</button>
    </div>
  </div>

  <div class="section-label" style="display:flex;align-items:center">
    <span id="label-entries">Teams</span>
    <button id="clear-btn" onclick="clearTeams()" style="margin-left:auto;margin-right:.5rem;background:none;border:1px dashed var(--red);color:var(--red);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:2px 8px;border-radius:5px;line-height:1.4">Clear</button>
  </div>
  <div id="teams-list"></div>
  <button class="ghost-btn" id="add-btn" onclick="addTeam()">＋ Add team</button>

  <button class="primary-btn" id="gen-btn" onclick="generate()">Generate schedule</button>
  <button class="danger-btn" id="reset-btn" style="display:none" onclick="resetTournament()">↺ Reset &amp; start over</button>

  <div class="section-label">Save as preset</div>
  <div class="save-preset-row">
    <input type="text" id="preset-name-input" placeholder="Preset name…"
      onkeydown="if(event.key==='Enter'){event.preventDefault();savePreset();}">
    <button onclick="savePreset()">Save</button>
  </div>
</div>

<!-- ──────────────── ROUNDS ──────────────── -->
<div id="screen-rounds" class="screen">
  <div class="page-title">Schedule</div>
  <div id="rounds-content"></div>
</div>

<!-- ──────────────── STANDINGS ──────────────── -->
<div id="screen-standings" class="screen">
  <div class="page-title">Standings</div>
  <div id="standings-content"></div>
</div>

<!-- ──────────────── PRESETS ──────────────── -->
<div id="screen-presets" class="screen">
  <div class="page-title">Presets</div>
  <div id="presets-list"></div>
</div>

<!-- ──────────────── NAV ──────────────── -->
<nav class="nav">
  <button class="nav-btn active" id="nav-setup" onclick="goTo('setup')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
    Setup
  </button>
  <button class="nav-btn" id="nav-rounds" onclick="goTo('rounds')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="4" width="18" height="16" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="8" y1="4" x2="8" y2="9"/>
      <line x1="16" y1="4" x2="16" y2="9"/>
    </svg>
    Rounds
  </button>
  <button class="nav-btn" id="nav-standings" onclick="goTo('standings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <line x1="6" y1="20" x2="6" y2="13"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="18" y1="20" x2="18" y2="9"/>
    </svg>
    Standings
  </button>
  <button class="nav-btn" id="nav-presets" onclick="goTo('presets')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
    </svg>
    Presets
  </button>
</nav>

<div id="toast" class="toast"></div>

<script>
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let openRounds = new Set(); // in-memory only, not persisted

let S = {
  mode: 'teams',        // 'teams' | 'singles' | 'mixer'
  courts: 2,
  teamSize: 2,          // mixer only: players per team
  numRounds: 4,         // mixer only: rounds to generate upfront
  teams: [],            // [{id, name}]  — players in mixer mode
  rounds: [],           // standard: [{matches:[{t1,t2,s1,s2,ed}], bye}]
                        // mixer:    [{matches:[{team1:[],team2:[],s1,s2,ed}], byes:[]}]
  generated: false
};

const STORE = 'americano_v2';
const PRESETS_STORE = 'americano_presets_v1';
let presets = [];
let openPresets = new Set();
function savePresets() { try { localStorage.setItem(PRESETS_STORE, JSON.stringify(presets)); } catch(e){} }
function loadPresets() { try { const r = localStorage.getItem(PRESETS_STORE); if (r) presets = JSON.parse(r); } catch(e){} }
function save() {
  try {
    const data = { ...S, rounds: S.rounds.map(r => ({
      ...r, matches: r.matches.map(({ ed, ...m }) => m)
    }))};
    localStorage.setItem(STORE, JSON.stringify(data));
  } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) S = { ...S, ...JSON.parse(raw) };
  } catch(e){}
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
load();
loadPresets();
const firstIncomplete = S.rounds.findIndex(r => r.matches.some(m => m.s1 === null));
if (firstIncomplete !== -1) openRounds.add(firstIncomplete);
renderSetup();
renderRounds();
renderStandings();
renderPresets();
const savedTab = sessionStorage.getItem('tab') || 'setup';
goTo(!S.generated && ['rounds','standings'].includes(savedTab) ? 'setup' : savedTab);
if (S.generated) {
  document.getElementById('reset-btn').style.display = '';
  document.getElementById('gen-btn').textContent = 'Regenerate schedule';
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
function goTo(name) {
  ['setup','rounds','standings','presets'].forEach(n => {
    document.getElementById('screen-'+n).classList.toggle('active', n===name);
    document.getElementById('nav-'+n).classList.toggle('active', n===name);
  });
  sessionStorage.setItem('tab', name);
  if (name === 'standings') renderStandings();
  if (name === 'presets') renderPresets();
}

/* ═══════════════════════════════════════════
   SETUP
═══════════════════════════════════════════ */
// 'Team' or 'Player' depending on mode
function noun(cap = true) {
  const w = (S.mode === 'singles' || S.mode === 'mixer') ? 'player' : 'team';
  return cap ? w[0].toUpperCase() + w.slice(1) : w;
}

function setMode(m) {
  S.mode = m; save(); renderSetup();
}

function renderSetup() {
  document.getElementById('courts-val').textContent = S.courts;
  document.getElementById('courts-minus').disabled = S.courts <= 1;

  // mode selector
  document.getElementById('mode-singles').classList.toggle('active', S.mode === 'singles');
  document.getElementById('mode-teams').classList.toggle('active',   S.mode === 'teams');
  document.getElementById('mode-mixer').classList.toggle('active', S.mode === 'mixer');
  const isMixer = S.mode === 'mixer';
  document.getElementById('mixer-settings').style.display = isMixer ? '' : 'none';
  if (isMixer) {
    document.getElementById('teamsize-val').textContent = S.teamSize;
    document.getElementById('teamsize-minus').disabled = S.teamSize <= 2;
    document.getElementById('numrounds-val').textContent = S.numRounds;
    document.getElementById('numrounds-minus').disabled = S.numRounds <= 1;
  }

  // dynamic labels
  document.getElementById('label-entries').textContent = noun() + 's';
  document.getElementById('add-btn').textContent = '＋ Add ' + noun(false);
  document.getElementById('clear-btn').style.display = S.teams.length ? '' : 'none';

  const list = document.getElementById('teams-list');
  list.innerHTML = '';
  S.teams.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'input-row';
    d.innerHTML =
      `<input type="text" placeholder="${noun()} ${i+1}" value="${esc(t.name)}"
         oninput="S.teams[${i}].name=this.value;save()"
         onkeydown="if(event.key==='Enter'){event.preventDefault();addTeam();}">` +
      `<button class="del-btn" onclick="removeTeam(${i})">×</button>`;
    list.appendChild(d);
  });
}

function adj(key, d) {
  if (key === 'courts')         S.courts    = Math.max(1, S.courts    + d);
  else if (key === 'teamSize')  S.teamSize  = Math.max(2, S.teamSize  + d);
  else if (key === 'numRounds') S.numRounds = Math.max(1, S.numRounds + d);
  save(); renderSetup();
}

function addTeam() {
  S.teams.push({ id: uid(), name: '' });
  save(); renderSetup();
  const inputs = document.getElementById('teams-list').querySelectorAll('input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeTeam(i) {
  S.teams.splice(i, 1);
  save(); renderSetup();
}

function clearTeams() {
  if (!S.teams.length) return;
  if (!confirm(`Remove all ${noun(false)}s?`)) return;
  S.teams = [];
  save(); renderSetup();
}

/* ═══════════════════════════════════════════
   SCHEDULE GENERATION  (circle method)
═══════════════════════════════════════════ */
function buildRounds(teams) {
  const list = teams.map(t => t.id);
  if (list.length % 2 !== 0) list.push(null); // null = bye slot
  const n = list.length;
  const rounds = [];

  const fixed = list[0];
  const rot   = list.slice(1);

  for (let r = 0; r < n - 1; r++) {
    const ring = [fixed, ...rot];
    const matches = [];
    let bye = null;
    for (let i = 0; i < n / 2; i++) {
      const a = ring[i], b = ring[n - 1 - i];
      if      (a === null) bye = b;
      else if (b === null) bye = a;
      else matches.push({ t1: a, t2: b, s1: null, s2: null, ed: false });
    }
    rounds.push({ matches, bye }); // bye is null when even number of teams
    rot.unshift(rot.pop()); // rotate
  }
  return rounds;
}

/* ═══════════════════════════════════════════
   MIXER GENERATION
═══════════════════════════════════════════ */
function pairKey(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildPairHistory(players, existingRounds) {
  const teammates = {}, opponents = {}, lastTeammates = {}, lastByes = new Set();
  const byeCount = {};
  players.forEach(p => { byeCount[p.id] = 0; });

  existingRounds.forEach((round, ri) => {
    const isLast = ri === existingRounds.length - 1;
    for (const m of round.matches) {
      if (!m.team1) continue;
      for (const team of [m.team1, m.team2]) {
        for (let i = 0; i < team.length; i++)
          for (let j = i + 1; j < team.length; j++) {
            const k = pairKey(team[i], team[j]);
            teammates[k] = (teammates[k] || 0) + 1;
            if (isLast) lastTeammates[k] = true;
          }
      }
      for (const a of m.team1) for (const b of m.team2) {
        const k = pairKey(a, b);
        opponents[k] = (opponents[k] || 0) + 1;
      }
    }
    if (round.byes) round.byes.forEach(id => {
      byeCount[id] = (byeCount[id] || 0) + 1;
      if (isLast) lastByes.add(id);
    });
  });

  const minByes = Math.min(...Object.values(byeCount));
  return { teammates, opponents, lastTeammates, lastByes, byeCount, minByes };
}

function scoreMixerGroups(groups, byes, history) {
  let score = 0;
  for (const g of groups) {
    for (const team of [g.team1, g.team2]) {
      for (let i = 0; i < team.length; i++)
        for (let j = i + 1; j < team.length; j++) {
          const k = pairKey(team[i], team[j]);
          score += history.lastTeammates[k] ? 200 : (history.teammates[k] || 0) * 10;
        }
    }
    for (const a of g.team1) for (const b of g.team2)
      score += (history.opponents[pairKey(a, b)] || 0);
  }
  // bye balance: penalize anyone with more byes than the current minimum
  // ×2000 per extra bye ensures balanced distribution before anything else
  for (const id of byes) {
    const over = (history.byeCount[id] || 0) - history.minByes;
    score += (over + 1) * 2000;
    if (history.lastByes.has(id)) score += 2000; // consecutive = double penalty
  }
  return score;
}

function buildMixerRound(players, teamSize, existingRounds) {
  // shuffle input so identical configs produce different schedules
  const ids = shuffle(players.map(p => p.id));
  const perMatch = teamSize * 2;
  const numMatches = Math.floor(ids.length / perMatch);
  const history = buildPairHistory(players, existingRounds);

  let best = null, bestScore = Infinity;
  for (let attempt = 0; attempt < 1000; attempt++) {
    const perm = shuffle([...ids]);
    const playing = perm.slice(0, numMatches * perMatch);
    const byes    = perm.slice(numMatches * perMatch);
    const groups  = [];
    for (let i = 0; i < numMatches; i++) {
      const g = playing.slice(i * perMatch, (i + 1) * perMatch);
      groups.push({ team1: g.slice(0, teamSize), team2: g.slice(teamSize) });
    }
    const score = scoreMixerGroups(groups, byes, history);
    // on tie, randomly replace so equally-good solutions vary
    if (score < bestScore || (score === bestScore && Math.random() < 0.3)) {
      bestScore = score; best = { groups, byes };
    }
  }

  return {
    matches: best.groups.map(g => ({ team1: g.team1, team2: g.team2, s1: null, s2: null, ed: false })),
    byes: best.byes
  };
}

function buildAllMixerRounds(players, teamSize, numRounds) {
  const rounds = [];
  for (let r = 0; r < numRounds; r++)
    rounds.push(buildMixerRound(players, teamSize, rounds));
  return rounds;
}

function addMixerRound() {
  const newRound = buildMixerRound(S.teams, S.teamSize, S.rounds);
  S.rounds.push(newRound);
  openRounds.add(S.rounds.length - 1);
  save(); renderRounds();
}

function shakeAddBtn() {
  const btn = document.getElementById('add-btn');
  btn.classList.remove('error');
  void btn.offsetWidth;
  btn.classList.add('error');
  setTimeout(() => btn.classList.remove('error'), 600);
}

function generate() {
  const valid = S.teams.every(t => t.name.trim());
  if (S.teams.length < 2) { shakeAddBtn(); showToast(`Need at least 2 ${noun(false)}s`); return; }
  if (!valid) {
    const idx = S.teams.findIndex(t => !t.name.trim());
    const inputs = document.getElementById('teams-list').querySelectorAll('input');
    const bad = inputs[idx];
    if (bad) {
      bad.classList.remove('error'); void bad.offsetWidth; bad.classList.add('error');
      bad.focus();
      setTimeout(() => bad.classList.remove('error'), 600);
    }
    showToast(`All ${noun(false)}s need a name`);
    return;
  }
  if (S.generated && !confirm('Regenerate will erase all scores. Continue?')) return;

  if (S.mode === 'mixer') {
    const minPlayers = S.teamSize * 2;
    if (S.teams.length < minPlayers) { shakeAddBtn(); showToast(`Need at least ${minPlayers} players for ${S.teamSize}v${S.teamSize}`); return; }
    S.rounds = buildAllMixerRounds(S.teams, S.teamSize, S.numRounds);
  } else {
    S.rounds = buildRounds(S.teams);
  }
  S.generated = true;
  openRounds = new Set([0]); // open first round only
  save();
  renderRounds();
  renderStandings();
  document.getElementById('reset-btn').style.display = '';
  document.getElementById('gen-btn').textContent = 'Regenerate schedule';
  goTo('rounds');
}

function resetTournament() {
  if (!confirm('Reset everything? Scores will be lost.')) return;
  S.rounds = []; S.generated = false;
  save();
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('gen-btn').textContent = 'Generate schedule';
  renderRounds(); renderStandings();
}

/* ═══════════════════════════════════════════
   ROUNDS RENDER
═══════════════════════════════════════════ */
function renderRoundsPreserving() {
  const snap = {};
  document.querySelectorAll('[id^="s1-"],[id^="s2-"]').forEach(el => { snap[el.id] = el.value; });
  renderRounds();
  Object.entries(snap).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.value = val; });
}

function fixLastRows() {
  document.querySelectorAll('.match-grid').forEach(grid => {
    // unwrap any previous run
    grid.querySelectorAll('.last-row-wrap').forEach(wrap => {
      [...wrap.children].forEach(c => { c.style.width = ''; c.style.flex = ''; grid.insertBefore(c, wrap); });
      wrap.remove();
    });
    if (!grid.offsetWidth) return; // skip collapsed/hidden rounds
    const cards = [...grid.children].filter(el => el.classList.contains('match-card'));
    if (cards.length < 2) return;
    const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').length;
    if (cols < 2) return;
    const rem = cards.length % cols;
    if (rem === 0) return;
    const cardWidth = cards[0].offsetWidth;
    const wrap = document.createElement('div');
    wrap.className = 'last-row-wrap';
    cards.slice(-rem).forEach(c => { c.style.width = cardWidth + 'px'; c.style.flex = 'none'; wrap.appendChild(c); });
    grid.appendChild(wrap);
  });
}

function renderRounds() {
  const el = document.getElementById('rounds-content');
  if (!S.generated || !S.rounds.length) {
    el.innerHTML = '<div class="empty"><strong>No schedule yet.</strong><br>Add teams and generate.</div>';
    return;
  }

  el.innerHTML = '';

  S.rounds.forEach((round, ri) => {
    const ms      = round.matches;
    const played  = ms.filter(m => m.s1 !== null).length;
    const editing = ms.some(m => m.ed);
    const total   = ms.length;
    const allDone = played === total && !editing;
    const inProg  = (played > 0 && !allDone) || editing;

    const statusText = allDone ? '<span style="color:var(--green)">✓</span> Done'
                     : inProg  ? '<span style="color:var(--accent)">In progress</span>'
                     : `${total} match${total !== 1 ? 'es' : ''}`;

    let byeHtml = '';
    if (round.byes && round.byes.length > 0) {
      const names = round.byes.map(id => teamById(id)?.name).filter(Boolean).map(esc);
      if (names.length) byeHtml = `<div class="bye-row">💤 <strong>${names.join(', ')}</strong> ${names.length === 1 ? 'has' : 'have'} a bye this round</div>`;
    } else if (round.bye) {
      const byeTeam = teamById(round.bye);
      if (byeTeam) byeHtml = `<div class="bye-row">💤 <strong>${esc(byeTeam.name)}</strong> has a bye this round</div>`;
    }

    const bodyHtml = ms.map((m, mi) =>
      matchHtml(m, ri, mi, (mi % S.courts) + 1)
    ).join('');

    const card = document.createElement('div');
    card.className = 'slot-card' + (openRounds.has(ri) ? ' open' : '');
    card.id = `slot-${ri}`;
    card.innerHTML =
      `<div class="slot-header" onclick="toggleSlot(${ri})">` +
        `<span class="slot-label">Round ${ri + 1}</span>` +
        `<span class="slot-status">${statusText}</span>` +
        `<svg class="slot-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>` +
      `</div>` +
      `<div class="slot-body">${byeHtml}<div class="match-grid">${bodyHtml}</div></div>`;

    el.appendChild(card);
  });

  if (S.mode === 'mixer') {
    const addBtn = document.createElement('button');
    addBtn.className = 'ghost-btn';
    addBtn.style.marginTop = '4px';
    addBtn.textContent = '＋ Add round';
    addBtn.onclick = addMixerRound;
    el.appendChild(addBtn);
  }

  setTimeout(fixLastRows, 0);
}

function toggleSlot(ri) {
  if (openRounds.has(ri)) openRounds.delete(ri);
  else openRounds.add(ri);
  document.getElementById(`slot-${ri}`).classList.toggle('open');
  if (openRounds.has(ri)) setTimeout(fixLastRows, 0);
}

function matchHtml(m, ri, mi, court) {
  if (m.team1) return mixerMatchHtml(m, ri, mi, court);
  const t1 = teamById(m.t1), t2 = teamById(m.t2);
  if (!t1 || !t2) return '';

  const header = `<div class="match-court">Court ${court}</div>`;

  if (m.s1 !== null && !m.ed) {
    const t1win = m.s1 > m.s2, t2win = m.s2 > m.s1;
    return `<div class="match-card">
      <div style="display:flex;align-items:center;margin-bottom:10px">
        <span class="match-court" style="margin-bottom:0;flex:1">Court ${court}</span>
        <div class="edit-link" onclick="editMatch(${ri},${mi})" style="margin-right:12px">Edit</div>
        <div class="edit-link" style="color:var(--red)" onclick="deleteMatch(${ri},${mi})">Delete</div>
      </div>
      <div class="match-played">
        <span class="tn ${t1win?'win':''}">${esc(t1.name)}</span>
        <div class="score-badge">
          <span class="sc ${t1win?'win':''}">${m.s1}</span>
          <span class="dash">–</span>
          <span class="sc ${t2win?'win':''}">${m.s2}</span>
        </div>
        <span class="tn r ${t2win?'win':''}">${esc(t2.name)}</span>
      </div>
    </div>`;
  }

  const v1 = (m.s1 !== null && m.s1 !== 0) ? m.s1 : '';
  const v2 = (m.s2 !== null && m.s2 !== 0) ? m.s2 : '';
  return `<div class="match-card">
    ${header}
    <div class="match-vs">
      <span class="tn">${esc(t1.name)}</span>
      <span class="vs-tag">vs</span>
      <span class="tn r">${esc(t2.name)}</span>
    </div>
    <div class="score-row">
      <input class="score-input" type="text" inputmode="decimal" pattern="[0-9]*"
        placeholder="0" value="${v1}" id="s1-${ri}-${mi}" autocomplete="off">
      <span class="score-dash">–</span>
      <input class="score-input" type="text" inputmode="decimal" pattern="[0-9]*"
        placeholder="0" value="${v2}" id="s2-${ri}-${mi}" autocomplete="off">
    </div>
    <button class="save-btn" onclick="saveMatch(${ri},${mi})">Save score</button>
  </div>`;
}

function mixerMatchHtml(m, ri, mi, court) {
  const team1 = m.team1.map(id => teamById(id)).filter(Boolean);
  const team2 = m.team2.map(id => teamById(id)).filter(Boolean);
  if (!team1.length || !team2.length) return '';

  if (m.s1 !== null && !m.ed) {
    const t1win = m.s1 > m.s2, t2win = m.s2 > m.s1;
    return `<div class="match-card">
      <div style="display:flex;align-items:center;margin-bottom:10px">
        <span class="match-court" style="margin-bottom:0;flex:1">Court ${court}</span>
        <div class="edit-link" onclick="editMatch(${ri},${mi})" style="margin-right:12px">Edit</div>
        <div class="edit-link" style="color:var(--red)" onclick="deleteMatch(${ri},${mi})">Delete</div>
      </div>
      <div class="mixer-row">
        <div class="mixer-team-col">
          ${team1.map(p => `<div class="mixer-player ${t1win?'win':''}">${esc(p.name)}</div>`).join('')}
        </div>
        <div class="score-badge" style="flex-shrink:0">
          <span class="sc ${t1win?'win':''}">${m.s1}</span>
          <span class="dash">–</span>
          <span class="sc ${t2win?'win':''}">${m.s2}</span>
        </div>
        <div class="mixer-team-col right">
          ${team2.map(p => `<div class="mixer-player ${t2win?'win':''}">${esc(p.name)}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  const v1 = (m.s1 !== null && m.s1 !== 0) ? m.s1 : '';
  const v2 = (m.s2 !== null && m.s2 !== 0) ? m.s2 : '';
  return `<div class="match-card">
    <div class="match-court">Court ${court}</div>
    <div class="mixer-row" style="margin-bottom:10px">
      <div class="mixer-team-col">
        ${team1.map(p => `<div class="mixer-player">${esc(p.name)}</div>`).join('')}
      </div>
      <span class="vs-tag" style="flex-shrink:0">vs</span>
      <div class="mixer-team-col right">
        ${team2.map(p => `<div class="mixer-player">${esc(p.name)}</div>`).join('')}
      </div>
    </div>
    <div class="score-row">
      <input class="score-input" type="text" inputmode="decimal" pattern="[0-9]*"
        placeholder="0" value="${v1}" id="s1-${ri}-${mi}" autocomplete="off">
      <span class="score-dash">–</span>
      <input class="score-input" type="text" inputmode="decimal" pattern="[0-9]*"
        placeholder="0" value="${v2}" id="s2-${ri}-${mi}" autocomplete="off">
    </div>
    <button class="save-btn" onclick="saveMatch(${ri},${mi})">Save score</button>
  </div>`;
}

function saveMatch(ri, mi) {
  const raw1 = document.getElementById(`s1-${ri}-${mi}`).value.trim();
  const raw2 = document.getElementById(`s2-${ri}-${mi}`).value.trim();
  const s1 = raw1 === '' ? 0 : parseInt(raw1);
  const s2 = raw2 === '' ? 0 : parseInt(raw2);
  if (isNaN(s1) || isNaN(s2) || s1 < 0 || s2 < 0) {
    alert('Enter valid scores for both teams.'); return;
  }
  S.rounds[ri].matches[mi].s1 = s1;
  S.rounds[ri].matches[mi].s2 = s2;
  S.rounds[ri].matches[mi].ed = false;
  const roundDone = S.rounds[ri].matches.every(m => m.s1 !== null);
  if (roundDone) openRounds.delete(ri);

  if (openRounds.size === 0) {
    const allDone = S.rounds.every(r => r.matches.every(m => m.s1 !== null));
    if (allDone) {
      save(); renderRoundsPreserving(); renderStandings(); goTo('standings'); return;
    }
    const next = S.rounds.findIndex(r => r.matches.some(m => m.s1 === null));
    if (next !== -1) openRounds.add(next);
  }

  save(); renderRoundsPreserving(); renderStandings();
}

function editMatch(ri, mi) {
  S.rounds[ri].matches[mi].ed = true;
  save(); renderRounds();
}

function deleteMatch(ri, mi) {
  S.rounds[ri].matches[mi].s1 = null;
  S.rounds[ri].matches[mi].s2 = null;
  S.rounds[ri].matches[mi].ed = false;
  save(); renderRounds(); renderStandings();
}

/* ═══════════════════════════════════════════
   STANDINGS
═══════════════════════════════════════════ */
function computeStandings() {
  const map = {};
  S.teams.forEach(t => {
    map[t.id] = { name: t.name, p: 0, w: 0, l: 0, d: 0, pts: 0, pa: 0 };
  });
  S.rounds.forEach(round => {
    round.matches.forEach(m => {
      if (m.s1 === null) return;
      if (m.team1) {
        // mixer: each player on the team shares the result
        const res = m.s1 > m.s2 ? 1 : m.s2 > m.s1 ? 2 : 0;
        for (const id of m.team1) {
          const a = map[id]; if (!a) continue;
          a.p++; a.pts += m.s1; a.pa += m.s2;
          if (res === 1) a.w++; else if (res === 2) a.l++; else a.d++;
        }
        for (const id of m.team2) {
          const b = map[id]; if (!b) continue;
          b.p++; b.pts += m.s2; b.pa += m.s1;
          if (res === 2) b.w++; else if (res === 1) b.l++; else b.d++;
        }
      } else {
        const a = map[m.t1], b = map[m.t2];
        if (!a || !b) return;
        a.p++; b.p++;
        a.pts += m.s1; b.pts += m.s2;
        a.pa  += m.s2; b.pa  += m.s1;
        if      (m.s1 > m.s2) { a.w++; b.l++; }
        else if (m.s2 > m.s1) { b.w++; a.l++; }
        else                  { a.d++; b.d++; }
      }
    });
  });
  return Object.values(map).sort((a, b) => {
    const bScore = b.w * 3 + b.d;
    const aScore = a.w * 3 + a.d;
    if (bScore !== aScore) return bScore - aScore;
    return (b.pts - b.pa) - (a.pts - a.pa);
  });
}

function renderStandings() {
  const el = document.getElementById('standings-content');
  if (!S.generated) {
    el.innerHTML = '<div class="empty"><strong>No tournament yet.</strong><br>Generate a schedule first.</div>';
    return;
  }

  const total  = S.rounds.reduce((s,r) => s + r.matches.length, 0);
  const played = S.rounds.reduce((s,r) => s + r.matches.filter(m => m.s1!==null).length, 0);
  const pct = total ? Math.round(played / total * 100) : 0;
  const rows = computeStandings();
  const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';

  el.innerHTML =
    `<p class="progress-label">${played} / ${total} matches played</p>` +
    `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>` +
    `<table class="s-table">
      <thead><tr>
        <th>#  ${S.mode === 'mixer' ? 'Player' : noun()}</th>
        <th>P</th>
        <th style="color:var(--green)">W</th>
        <th style="color:var(--muted)">D</th>
        <th style="color:var(--red)">L</th>
        <th>+/−</th><th>Pts</th>
      </tr></thead>
      <tbody>
      ${rows.map((r,i) => `<tr>
        <td><span class="rank-num ${rankClass(i)}">${i+1}</span><span class="s-name">${esc(r.name)}</span></td>
        <td>${r.p}</td>
        <td style="color:var(--green);font-weight:700">${r.w}</td>
        <td style="color:var(--muted);font-weight:700">${r.d}</td>
        <td style="color:var(--red);font-weight:700">${r.l}</td>
        <td style="color:${r.pts-r.pa>=0?'var(--green)':'var(--red)'}">${r.pts-r.pa>=0?'+':''}${r.pts-r.pa}</td>
        <td class="s-pts">${r.w*3+r.d}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    <p style="font-size:12px;color:var(--muted);margin-top:18px;line-height:1.7">
      <strong style="color:var(--text)">Pts</strong> = <span style="color:var(--green)">Win</span> ×3 + <span style="color:var(--muted)">Draw</span> ×1 + <span style="color:var(--red)">Loss</span> ×0.<br>
      Tiebreaker: <strong style="color:var(--text)">+/−</strong> (points scored minus points conceded).
    </p>`;
}

/* ═══════════════════════════════════════════
   PRESETS
═══════════════════════════════════════════ */
function savePreset() {
  const input = document.getElementById('preset-name-input');
  const name = input.value.trim();
  if (!name) {
    input.classList.remove('error');
    void input.offsetWidth; // force reflow to restart animation
    input.classList.add('error');
    input.focus();
    setTimeout(() => input.classList.remove('error'), 600);
    return;
  }
  if (!S.teams.length) { alert('Add at least one entry first.'); return; }
  presets.unshift({
    id: uid(),
    name,
    mode: S.mode,
    courts: S.courts,
    teamSize: S.teamSize,
    numRounds: S.numRounds,
    teams: S.teams.map(t => ({ id: uid(), name: t.name }))
  });
  savePresets();
  showToast(`"${name}" saved`);
  input.value = '';
  renderPresets();
}

function loadPreset(id) {
  const p = presets.find(x => x.id === id);
  if (!p) return;
  if (S.generated && !confirm('Loading preset will reset the current tournament. Continue?')) return;
  S.mode      = p.mode;
  S.courts    = p.courts;
  S.teamSize  = p.teamSize  ?? 2;
  S.numRounds = p.numRounds ?? 4;
  S.teams     = p.teams.map(t => ({ id: uid(), name: t.name }));
  S.rounds    = [];
  S.generated = false;
  save();
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('gen-btn').textContent = 'Generate schedule';
  renderSetup();
  renderRounds();
  renderStandings();
  goTo('setup');
}

function deletePreset(id) {
  presets = presets.filter(p => p.id !== id);
  savePresets();
  renderPresets();
}

function togglePreset(id) {
  if (openPresets.has(id)) openPresets.delete(id);
  else openPresets.add(id);
  document.getElementById(`preset-${id}`).classList.toggle('open');
}

function renderPresets() {
  const el = document.getElementById('presets-list');
  if (!el) return;
  if (!presets.length) {
    el.innerHTML = '<div class="empty" style="padding:30px 0"><strong>No presets yet.</strong><br>Configure a setup in the Setup tab and save it.</div>';
    return;
  }
  const modeLabel = m => m === 'singles' ? 'Singles' : m === 'mixer' ? 'Mixer' : 'Teams';
  el.innerHTML = presets.map(p => {
    const noun = p.mode === 'teams' ? 'team' : 'player';
    const meta = `${modeLabel(p.mode)} · ${p.courts} court${p.courts !== 1 ? 's' : ''} · ${p.teams.length} ${noun}${p.teams.length !== 1 ? 's' : ''}` +
      (p.mode === 'mixer' ? ` · ${p.teamSize}v${p.teamSize}` : '');
    const tags = p.teams.map(t => `<span class="preset-tag">${esc(t.name)}</span>`).join('');
    const isOpen = openPresets.has(p.id);
    return `<div class="preset-item${isOpen ? ' open' : ''}" id="preset-${p.id}">
      <div class="preset-header" onclick="togglePreset('${p.id}')">
        <div class="preset-info">
          <div class="preset-name">${esc(p.name)}</div>
          <div class="preset-meta">${esc(meta)}</div>
        </div>
        <div class="preset-actions" onclick="event.stopPropagation()">
          <button class="preset-load-btn" onclick="loadPreset('${p.id}')">Load</button>
          <button class="preset-del-btn" onclick="deletePreset('${p.id}')">✕</button>
        </div>
        <svg class="preset-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="preset-body">
        <div class="preset-names">${tags}</div>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function teamById(id) { return S.teams.find(t => t.id === id); }

let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { renderRounds(); }, 150);
});
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
